<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão Copa 2026 - Grupos Oficiais</title>
    <!-- Mantenha aqui o seu <style> que você já possui -->
</head>
<body>

<div class="container">
    <!-- Mantenha aqui o seu <header> e estrutura HTML que você já possui -->
</div>

<script>
    // 1. SUA LISTA DE JOGOS (Substitua a linha abaixo pela sua lista completa)
    const JOGOS_OFICIAIS_FIFA = [...]; 

    // 2. CONFIGURAÇÕES INICIAIS
    const PARTICIPANTES = ["Luiz Viana", "Caio", "David", "Márcio", "Tainá"];
    let currentGroupFilter = "TODOS";
    let listagemDesbloqueadaParaAmigo = false;

    let dadosBolao = JSON.parse(localStorage.getItem('bolao2026')) || { 
        resultadosOficiais: {}, 
        palpites: {} 
    };

    // 3. FUNÇÕES PRINCIPAIS
    function renderMatches() {
        const user = document.getElementById('select-user').value;
        const container = document.getElementById('matches-container');
        container.innerHTML = '';

        const isAdmin = user === "Admin (Resultados Oficiais)";
        let isDisabled = (isAdmin || listagemDesbloqueadaParaAmigo) ? "" : "disabled";

        JOGOS_OFICIAIS_FIFA.forEach(jogo => {
            if (currentGroupFilter !== "TODOS" && jogo.grupo !== currentGroupFilter) return;

            if (!dadosBolao.palpites[user]) dadosBolao.palpites[user] = {};
            const palpite = dadosBolao.palpites[user][jogo.id] || { m: "", v: "" };

            container.innerHTML += `
                <div class="match-block">
                    <div class="match-info">${jogo.data} • ${jogo.cidade} • ${jogo.grupo}</div>
                    <div class="match-row">
                        <div class="team-container team-left">${jogo.mandante}</div>
                        <input type="number" ${isDisabled} value="${palpite.m}" onchange="update(${jogo.id}, 'm', this.value)">
                        <span>x</span>
                        <input type="number" ${isDisabled} value="${palpite.v}" onchange="update(${jogo.id}, 'v', this.value)">
                        <div class="team-container team-right">${jogo.visitante}</div>
                    </div>
                </div>
            `;
        });
    }

    function update(id, campo, valor) {
        const user = document.getElementById('select-user').value;
        if (!dadosBolao.palpites[user]) dadosBolao.palpites[user] = {};
        if (!dadosBolao.palpites[user][id]) dadosBolao.palpites[user][id] = { m: "", v: "" };
        dadosBolao.palpites[user][id][campo] = valor;
    }

    function saveData() {
        localStorage.setItem('bolao2026', JSON.stringify(dadosBolao));
        alert("Palpites salvos com sucesso!");
        location.reload();
    }

    function filterGroup(grupo, btn) {
        currentGroupFilter = grupo;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderMatches();
    }

    // Inicialização
    window.onload = function() {
        renderMatches();
    };

</script>
</body>
</html>
